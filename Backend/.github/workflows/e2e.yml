name: E2E Behavioral Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E — Mall Loyalty API
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Override these in GitHub Secrets → Repository secrets
      BASE_URL: http://localhost:5000
      TEST_MALL_ID: ${{ secrets.TEST_MALL_ID || '1' }}
      TEST_MANAGER_ID: ${{ secrets.TEST_MANAGER_ID || '1' }}
      TEST_STORE_ID: ${{ secrets.TEST_STORE_ID || '1' }}
      # Pass the DB connection string so the backend can start
      ConnectionStrings__DefaultConnection: ${{ secrets.TEST_DB_CONNECTION_STRING }}

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup .NET 8 ─────────────────────────────────────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── 3. Restore & Build backend ──────────────────────────────────────────
      - name: Restore NuGet packages
        run: dotnet restore Graduation_Project_Backend.csproj

      - name: Build backend
        run: dotnet build Graduation_Project_Backend.csproj --no-restore --configuration Release

      # ── 4. Start backend in background ─────────────────────────────────────
      - name: Start backend server
        run: |
          dotnet run --project Graduation_Project_Backend.csproj \
            --configuration Release \
            --urls http://localhost:5000 &
          echo "Waiting for backend to be ready..."
          timeout 60 bash -c 'until curl -sf http://localhost:5000/swagger/index.html; do sleep 2; done'
        env:
          ASPNETCORE_ENVIRONMENT: Development

      # ── 5. Setup Node.js ────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package.json

      # ── 6. Install Playwright + dependencies ────────────────────────────────
      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      # ── 7. Run E2E tests ────────────────────────────────────────────────────
      - name: Run E2E tests
        working-directory: e2e
        run: npm run test:ci
        env:
          CI: true

      # ── 8. Upload test artifacts ────────────────────────────────────────────
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-junit
          path: e2e/test-results/results.xml
          retention-days: 14

      # ── 9. Publish test summary to PR ───────────────────────────────────────
      - name: Publish test summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: E2E Test Results
          path: e2e/test-results/results.xml
          reporter: java-junit
          fail-on-error: true
